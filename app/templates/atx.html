<!DOCTYPE html>
<html lang="en" data-theme="{{ session.get('userdata', {}).get('theme', 'light') }}">

<head>
    <!-- Meta Configuration -->
    <meta charset="UTF-8">
    <title>ATX</title>

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='img/cisco.svg') }}" type="image/x-icon">

    <!-- Web App Manifest -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    {% block head %}
    <!-- =========================
         Global Stylesheets
         ========================= -->
    <link
            rel="stylesheet"
            id="stylesheet"
            href="{{ url_for('static', filename='css/common.css') }}"
    >

    <!-- =========================
         Font Loading Optimization
         Ensures Material Symbols are loaded before applying styles
         ========================= -->
    <script>
        document.fonts.load('21px "Material Symbols Rounded"').then(() => {
          document.documentElement.classList.add('fonts-loaded');
        });
    </script>
    {% endblock %}
</head>

<body>
<!-- =========================
     Main Dynamic Content Block
     Content will be injected here via templating engine
     ========================= -->
{% block body %}
{% endblock %}
</body>

</html>
