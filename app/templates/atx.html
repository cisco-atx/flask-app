<!DOCTYPE html>
<html lang="en" data-theme="{{ session.get('userdata', {}).get('theme', 'light') }}">

<head>
    <meta charset="UTF-8">
    <title>Atx</title>
    <link rel="icon" href="{{ url_for('static', filename='img/cisco.svg') }}" type="image/x-icon">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">


    {% block head %}
    <!-- Stylesheets -->
    <link rel="stylesheet" id="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">

    <script>
        document.fonts.load('21px "Material Symbols Rounded"').then(() => {
            document.documentElement.classList.add('fonts-loaded');
        });
    </script>
    {% endblock %}
</head>

<body>
<!-- Dynamic Content -->
{% block body %}{% endblock %}
</body>

</html>
